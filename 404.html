    <style>
      /* Error Page Styling */
      .error-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      }

      .error-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .error-card {
        max-width: 800px;
        width: 100%;
        padding: 4rem 2rem;
        border-radius: 1.5rem;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
        position: relative;
        margin: auto;
      }

      .error-icon {
        font-size: 8rem;
        color: #4f46e5;
        margin-bottom: 2rem;
        animation: float 3s ease-in-out infinite;
      }

      .error-decor {
        position: absolute;
        opacity: 0.1;
        font-size: 6rem !important;
      }

      .error-decor.top-left {
        top: -30px;
        left: -30px;
        transform: rotate(45deg);
      }

      .error-decor.bottom-right {
        bottom: -30px;
        right: -30px;
        transform: rotate(-45deg);
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      .error-btn {
        transition: all 0.3s ease;
        padding: 1rem 2rem;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
      }

      .error-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
      }

      .error-footer {
        background: #ffffff;
        padding: 1.5rem;
        text-align: center;
        border-top: 1px solid #e9ecef;
      }
    </style>
  </head>

  <body class="error-container">
    <!-- Spinner -->
    <div

    >

        class="spinner-border text-primary"
        style="width: 3rem; height: 3rem"

    <!-- Main Content -->

        <i class="bi bi-x-octagon-fill error-decor bottom-right"></i>

        <!-- Main Content -->

        <h1 class="display-2 fw-bold text-primary mb-3">404</h1>
